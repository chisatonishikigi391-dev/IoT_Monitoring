<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT Monitoring</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    color: white;
    text-align: center;
    background: url('https://images.unsplash.com/photo-1518770660439-4636190af475') no-repeat center center fixed;
    background-size: cover;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

.header {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    position: sticky;
    top: 0;
    z-index: 99;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.status {
    font-size: 14px;
    margin-bottom: 15px;
}

.online { color: #00ff9c; }
.offline { color: red; }

.sensor-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
}

.sensor {
    flex: 1;
    min-width: 180px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius: 16px;
    padding: 12px;
    transition: 0.25s;
}

.sensor:hover {
    transform: translateY(-6px) scale(1.05);
    box-shadow: 0 0 20px rgba(0,255,200,0.6);
}

.icon {
    font-size: 20px;
}

.value {
    font-size: 24px;
    font-weight: bold;
}

.card {
    position: relative;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border-radius: 18px;
    padding: 15px;
    margin: 12px 0;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow:
        inset 0 0 10px rgba(255,255,255,0.05),
        0 0 15px rgba(0,255,200,0.15),
        0 0 30px rgba(0,255,200,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

button {
    position: relative;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    overflow: hidden;
    color: white;
    transition: 0.3s;
}

.manual {
    background: linear-gradient(145deg, #ff9800, #ff6f00);
}

.auto {
    background: linear-gradient(145deg, #00e676, #00c853);
}

.reset {
    background: linear-gradient(145deg, #ff5252, #d50000);
}

.card button {
    width: 45%;
}

button:hover {
    transform: scale(1.07);
}

button::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(
        120deg,
        rgba(255,255,255,0.7),
        rgba(255,255,255,0.2),
        transparent
    );
    transform: skewX(-25deg);
}

button:hover::before {
    left: 130%;
    transition: 0.6s;
}

@keyframes rgbGlow {
    0% { box-shadow: 0 0 10px red; }
    50% { box-shadow: 0 0 20px cyan; }
    100% { box-shadow: 0 0 10px magenta; }
}

.rgb {
    animation: rgbGlow 2s linear infinite;
}

canvas {
    margin-top: 10px;
    transition: 0.3s;
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #ccc;
    padding-bottom: 20px;
}

.layout-row {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.temp-info {
    margin-top: 15px;
    margin-bottom: 15px;
}

.temp-info span {
    display: inline-block;
    margin: 5px;
    padding: 8px 14px;
    border-radius: 10px;
    font-weight: bold;
}

.hijau {
    background: rgba(0,255,0,0.2);
    color: lime;
}

.kuning {
    background: rgba(255,255,0,0.2);
    color: yellow;
}

.merah {
    background: rgba(255,0,0,0.2);
    color: red;
}

@media(max-width:768px){

    .layout-row{
        flex-direction:column;
    }

    .card button{
        width:100%;
    }

    .sensor-row{
        flex-direction:column;
    }
}

</style>
</head>

<body>

<div class="header">🌐 IoT Monitoring System</div>

<div class="container">

<div id="status" class="status offline">● Offline</div>

<div class="sensor-row">

    <div class="sensor">
        <div class="icon">🌡</div>
        <div id="suhu" class="value">--</div>
    </div>

    <div class="sensor">
        <div class="icon">💧</div>
        <div id="hum" class="value">--</div>
    </div>

    <div class="sensor">
        <div class="icon">💡</div>
        <div id="ldr" class="value">--</div>
    </div>

</div>

<div class="temp-info">
    <span class="hijau">20° - 25° = HIJAU</span>
    <span class="kuning">26° - 30° = KUNING</span>
    <span class="merah">31°+ = MERAH</span>
</div>

<div class="layout-row">

<div class="card" style="flex:1;">
<h3>Grafik Sensor</h3>
<canvas id="chart"></canvas>
</div>

<div class="card" style="flex:1;">

<h3>Manual Control</h3>

<button class="manual" onclick="sendCmd('R1:1')">R1 ON</button>
<button class="manual" onclick="sendCmd('R1:0')">R1 OFF</button><br>

<button class="manual" onclick="sendCmd('R2:1')">R2 ON</button>
<button class="manual" onclick="sendCmd('R2:0')">R2 OFF</button><br>

<button class="manual" onclick="sendCmd('R3:1')">R3 ON</button>
<button class="manual" onclick="sendCmd('R3:0')">R3 OFF</button><br>

<button class="manual" onclick="sendCmd('R4:1')">R4 ON</button>
<button class="manual" onclick="sendCmd('R4:0')">R4 OFF</button><br>

<button class="reset rgb" onclick="resetAll()">RESET</button>

</div>

</div>

<div class="card">

<h3>Mode</h3>

<button class="auto" onclick="sendCmd('MODE:SUHU')">AUTO</button>
<button class="manual" onclick="sendCmd('MODE:BUTTON')">MANUAL</button>

</div>

</div>

<div class="footer">
© 2026 IoT Monitoring/LiHaDa.id
</div>

<script>

const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

let labels = [];
let suhuData = [];
let humData = [];
let ldrData = [];

const MAX_DATA = 50;

const ctx = document.getElementById("chart");

const chart = new Chart(ctx, {

    type: 'line',

    data: {

        labels: labels,

        datasets: [

            {
                label: 'Suhu',
                data: suhuData,
                borderWidth: 3,
                borderColor: "lime",
                backgroundColor: "lime",
                tension: 0.4,
                pointRadius: 3,
                pointHoverRadius: 6
            },

            {
                label: 'Kelembapan',
                data: humData,
                borderWidth: 2,
                borderColor: "cyan",
                backgroundColor: "cyan",
                tension: 0.4
            },

            {
                label: 'Cahaya',
                data: ldrData,
                borderWidth: 2,
                borderColor: "orange",
                backgroundColor: "orange",
                tension: 0.4
            }

        ]
    },

    options: {

        responsive: true,

        animation: {
            duration: 700,
            easing: 'easeInOutQuart'
        },

        plugins: {

            legend: {
                labels: {
                    color: "white"
                }
            }
        },

        scales: {

            x: {
                ticks: {
                    color: "white"
                }
            },

            y: {
                ticks: {
                    color: "white"
                }
            }
        }
    }
});

/* GLOW */
function updateChartGlow(suhu) {

    if (suhu >= 0 && suhu <= 25) {
        ctx.style.boxShadow = "0 0 20px lime";
    }

    else if (suhu >= 26 && suhu <= 30) {
        ctx.style.boxShadow = "0 0 25px yellow";
    }

    else if (suhu >= 30) {
        ctx.style.boxShadow = "0 0 30px red";
    }
}

/* WARNA GARIS */
function updateChartColor(suhu) {

    let color = "white";

    if (suhu >= 0 && suhu <= 25) {
        color = "lime";
    }

    else if (suhu >= 26 && suhu <= 30) {
        color = "yellow";
    }

    else if (suhu >= 30) {
        color = "red";
    }

    chart.data.datasets[0].borderColor = color;
    chart.data.datasets[0].backgroundColor = color;
}

/* WARNA TEKS SUHU */
function updateSuhuColor(suhu) {

    let suhuEl = document.getElementById("suhu");

    if (suhu >= 0 && suhu <= 25) {
        suhuEl.style.color = "lime";
    }

    else if (suhu >= 26 && suhu <= 30) {
        suhuEl.style.color = "yellow";
    }

    else if (suhu >= 30) {
        suhuEl.style.color = "red";
    }

    else {
        suhuEl.style.color = "white";
    }
}

/* NOTIFIKASI */
if (Notification.permission !== "granted") {
    Notification.requestPermission();
}

function playAlertSound() {

    const audio = new Audio(
        "https://www.soundjay.com/buttons/sounds/beep-07.mp3"
    );

    audio.play();
}

let lastAlert = 0;

function cekSuhuAlert(suhu) {

    let now = Date.now();

    if (suhu >= 31 && now - lastAlert > 10000) {

        lastAlert = now;

        if (Notification.permission === "granted") {

            new Notification("🔥 SUHU TINGGI!", {

                body: "Suhu mencapai " + suhu + "°C",

                icon: "https://cdn-icons-png.flaticon.com/512/1684/1684375.png"

            });
        }

        playAlertSound();
    }
}

/* MQTT CONNECT */
client.on("connect", () => {

    document.getElementById("status").innerHTML = "● Online";
    document.getElementById("status").className = "status online";

    subscribeTopics();
});

/* AUTO RECONNECT */
client.on("reconnect", () => {

    console.log("Reconnect MQTT...");

    subscribeTopics();
});

function subscribeTopics(){

    client.subscribe("smkn2klaten/kel-8/esp32/suhu");
    client.subscribe("smkn2klaten/kel-8/esp32/kelembaban");
    client.subscribe("smkn2klaten/kel-8/esp32/ldr");
}

/* REALTIME DATA */
client.on("message", (topic, message) => {

    let msg = message.toString();

    /* SUHU */
    if (topic.includes("suhu")) {

        let time = new Date().toLocaleTimeString();

        labels.push(time);

        let val = parseFloat(msg);

        suhuData.push(val);

        updateChartGlow(val);
        updateChartColor(val);
        cekSuhuAlert(val);

        document.getElementById("suhu").innerHTML = val + "°C";
        updateSuhuColor(val);
    }

    /* KELEMBABAN */
    if (topic.includes("kelembaban")) {

        document.getElementById("hum").innerHTML = msg + "%";

        humData.push(parseFloat(msg));

        while(humData.length < suhuData.length){
            humData.unshift(null);
        }
    }

    /* LDR */
    if (topic.includes("ldr")) {

        document.getElementById("ldr").innerHTML = msg;

        ldrData.push(parseFloat(msg));

        while(ldrData.length < suhuData.length){
            ldrData.unshift(null);
        }
    }

    /* BATASI DATA */
    if (labels.length > MAX_DATA) {

        labels.shift();

        if (suhuData.length > MAX_DATA) suhuData.shift();
        if (humData.length > MAX_DATA) humData.shift();
        if (ldrData.length > MAX_DATA) ldrData.shift();
    }

    chart.update();
});

/* CONTROL */
function sendCmd(cmd) {

    client.publish(
        "smkn2klaten/kel-8/esp32/control",
        cmd
    );
}

function resetAll() {

    client.publish(
        "smkn2klaten/kel-8/esp32/control",
        "R1:0#R2:0#R3:0#R4:0"
    );
}

/* TRAIL EFFECT */
const originalDraw = chart.draw;

chart.draw = function() {

    const c = this.ctx;

    c.save();

    c.shadowColor =
        chart.data.datasets[0].borderColor || "lime";

    c.shadowBlur = 15;

    c.lineWidth = 2;

    originalDraw.apply(this, arguments);

    c.restore();
};

</script>

</body>
</html>
