<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT Monitoring</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    color: white;
    text-align: center;
    background: url('https://images.unsplash.com/photo-1518770660439-4636190af475') no-repeat center center fixed;
    background-size: cover;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

.header {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    position: sticky;
    top: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.status {
    font-size: 14px;
    margin-bottom: 10px;
}

.online {
    color: #00ff9c;
}

.offline {
    color: red;
}

.sensor-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
}

.sensor {
    flex: 1;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius: 16px;
    padding: 12px;
    transition: 0.25s;
}

.sensor:hover {
    transform: translateY(-6px) scale(1.05);
    box-shadow: 0 0 20px rgba(0,255,200,0.6);
}

.icon {
    font-size: 20px;
}

.value {
    font-size: 24px;
    font-weight: bold;
}

.card {
    position: relative;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border-radius: 18px;
    padding: 15px;
    margin: 12px 0;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow:
        inset 0 0 10px rgba(255,255,255,0.05),
        0 0 15px rgba(0,255,200,0.15),
        0 0 30px rgba(0,255,200,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

button {
    position: relative;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    overflow: hidden;
}

.manual {
    background: linear-gradient(145deg, #ff9800, #ff6f00);
}

.auto {
    background: linear-gradient(145deg, #00e676, #00c853);
}

.reset {
    background: linear-gradient(145deg, #ff5252, #d50000);
}

.card button {
    width: 45%;
}

button:hover {
    transform: scale(1.07);
}

canvas {
    margin-top: 10px;
    transition: 0.3s;
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #ccc;
}

.layout-row {
    display: flex;
    gap: 15px;
}

@keyframes rgbGlow {
    0% { box-shadow: 0 0 10px red; }
    50% { box-shadow: 0 0 20px cyan; }
    100% { box-shadow: 0 0 10px magenta; }
}

.rgb {
    animation: rgbGlow 2s linear infinite;
}

</style>
</head>

<body>

<div class="header">🌐 IoT Monitoring System</div>

<div class="container">

<div id="status" class="status offline">● Offline</div>

<div class="sensor-row">

    <div class="sensor">
        <div class="icon">🌡</div>
        <div id="suhu" class="value">--</div>
    </div>

    <div class="sensor">
        <div class="icon">💧</div>
        <div id="hum" class="value">--</div>
    </div>

    <div class="sensor">
        <div class="icon">💡</div>
        <div id="ldr" class="value">--</div>
    </div>

</div>

<div class="layout-row">

<div class="card" style="flex:1;">
    <h3>Grafik Sensor</h3>
    <canvas id="chart"></canvas>
</div>

<div class="card" style="flex:1;">

    <h3>Manual Control</h3>

    <button class="manual" onclick="sendCmd('R1:1')">R1 ON</button>
    <button class="manual" onclick="sendCmd('R1:0')">R1 OFF</button><br>

    <button class="manual" onclick="sendCmd('R2:1')">R2 ON</button>
    <button class="manual" onclick="sendCmd('R2:0')">R2 OFF</button><br>

    <button class="manual" onclick="sendCmd('R3:1')">R3 ON</button>
    <button class="manual" onclick="sendCmd('R3:0')">R3 OFF</button><br>

    <button class="manual" onclick="sendCmd('R4:1')">R4 ON</button>
    <button class="manual" onclick="sendCmd('R4:0')">R4 OFF</button><br>

    <button class="reset rgb" onclick="resetAll()">RESET</button>

</div>

</div>

<div class="card">

    <h3>Mode</h3>

    <button class="auto" onclick="sendCmd('MODE:SUHU')">AUTO</button>
    <button class="manual" onclick="sendCmd('MODE:BUTTON')">MANUAL</button>

</div>

</div>

<div class="footer">© 2026 IoT Monitoring/LiHaDa.id</div>

<script>

const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

let labels = [];
let suhuData = [];
let humData = [];
let ldrData = [];

const ctx = document.getElementById("chart");

const chart = new Chart(ctx, {

    type: 'line',

    data: {
        labels: labels,

        datasets: [

            {
                label: 'Suhu',
                data: suhuData,
                borderColor: 'lime',
                backgroundColor: 'lime',
                borderWidth: 2,
                tension: 0.35
            },

            {
                label: 'Kelembapan',
                data: humData,
                borderColor: 'cyan',
                backgroundColor: 'cyan',
                borderWidth: 2,
                tension: 0.35
            },

            {
                label: 'Cahaya',
                data: ldrData,
                borderColor: 'orange',
                backgroundColor: 'orange',
                borderWidth: 2,
                tension: 0.35
            }

        ]
    },

    options: {

        responsive: true,

        animation: {
            duration: 500,
            easing: 'linear'
        },

        scales: {

            x: {
                ticks: {
                    color: "white"
                }
            },

            y: {
                ticks: {
                    color: "white"
                }
            }

        },

        plugins: {

            legend: {
                labels: {
                    color: "white"
                }
            }

        }
    }

});


/* CHART GLOW */
function updateChartGlow(suhu) {

    if (suhu >= 20 && suhu <= 25) {
        ctx.style.boxShadow = "0 0 20px lime";
    }

    else if (suhu >= 26 && suhu <= 30) {
        ctx.style.boxShadow = "0 0 25px yellow";
    }

    else if (suhu >= 31) {
        ctx.style.boxShadow = "0 0 30px red";
    }
}


/* WARNA GARIS DINAMIS */
function updateChartColor(suhu) {

    if (suhu >= 20 && suhu <= 25) {

        chart.data.datasets[0].borderColor = "lime";
        chart.data.datasets[0].backgroundColor = "lime";
    }

    else if (suhu >= 26 && suhu <= 30) {

        chart.data.datasets[0].borderColor = "yellow";
        chart.data.datasets[0].backgroundColor = "yellow";
    }

    else if (suhu >= 31) {

        chart.data.datasets[0].borderColor = "red";
        chart.data.datasets[0].backgroundColor = "red";
    }
}


/* NOTIFIKASI */
if (Notification.permission !== "granted") {
    Notification.requestPermission();
}

function playAlertSound() {

    const audio = new Audio(
        "https://www.soundjay.com/buttons/sounds/beep-07.mp3"
    );

    audio.play();
}

let lastAlert = 0;

function cekSuhuAlert(suhu) {

    let now = Date.now();

    if (suhu >= 31 && now - lastAlert > 10000) {

        lastAlert = now;

        if (Notification.permission === "granted") {

            new Notification("🔥 SUHU TINGGI!", {

                body: "Suhu mencapai " + suhu + "°C",

                icon: "https://cdn-icons-png.flaticon.com/512/1684/1684375.png"
            });
        }

        playAlertSound();
    }
}


/* MQTT CONNECT */
client.on("connect", () => {

    document.getElementById("status").innerHTML = "● Online";

    document.getElementById("status").className = "status online";

    client.subscribe("smkn2klaten/kel-8/esp32/suhu");

    client.subscribe("smkn2klaten/kel-8/esp32/kelembaban");

    client.subscribe("smkn2klaten/kel-8/esp32/ldr");
});


/* AUTO SCROLL */
const MAX_DATA = 50;

function autoScroll() {

    while (labels.length > MAX_DATA) labels.shift();

    while (suhuData.length > MAX_DATA) suhuData.shift();

    while (humData.length > MAX_DATA) humData.shift();

    while (ldrData.length > MAX_DATA) ldrData.shift();
}


/* REALTIME DATA */
client.on("message", (topic, message) => {

    let msg = message.toString();

    let time = new Date().toLocaleTimeString();

    labels.push(time);

    /* SUHU */
    if (topic.includes("suhu")) {

        let val = parseFloat(msg);

        document.getElementById("suhu").innerHTML = val + "°C";

        suhuData.push(val);

        updateChartGlow(val);

        updateChartColor(val);

        cekSuhuAlert(val);

    } else {

        suhuData.push(null);
    }


    /* KELEMBABAN */
    if (topic.includes("kelembaban")) {

        let hum = parseFloat(msg);

        document.getElementById("hum").innerHTML = hum + "%";

        humData.push(hum);

    } else {

        humData.push(null);
    }


    /* LDR */
    if (topic.includes("ldr")) {

        let ldr = parseFloat(msg);

        document.getElementById("ldr").innerHTML = ldr;

        ldrData.push(ldr);

    } else {

        ldrData.push(null);
    }

    autoScroll();

    chart.update('active');

});


/* CONTROL */
function sendCmd(cmd) {

    client.publish(
        "smkn2klaten/kel-8/esp32/control",
        cmd
    );
}


/* RESET */
function resetAll() {

    client.publish(
        "smkn2klaten/kel-8/esp32/control",
        "R1:0#R2:0#R3:0#R4:0"
    );
}

</script>

    <script>

/* =========================
   🔥 AUTO SCROLL WINDOW DATA
========================= */
const MAX_DATA = 50;

function autoScroll() {
    if (labels.length > MAX_DATA) {
        labels.shift();
        suhuData.shift();
        humData.shift();
        ldrData.shift();
    }
}

/* =========================
   🔥 ANIMASI SCROLL HALUS
========================= */
chart.options.animation = {
    duration: 600,
    easing: 'linear'
};

chart.options.elements = {
    line: {
        tension: 0.35
    },
    point: {
        radius: 3,
        hoverRadius: 5
    }
};

/* =========================
   🔥 STYLE DATASET
========================= */
chart.data.datasets[0].borderColor = "yellow";
chart.data.datasets[0].backgroundColor = "yellow";

chart.data.datasets[1].borderColor = "cyan";
chart.data.datasets[1].backgroundColor = "cyan";

chart.data.datasets[2].borderColor = "orange";
chart.data.datasets[2].backgroundColor = "orange";

chart.data.datasets.forEach(ds => {
    ds.fill = false;
    ds.tension = 0.35;
});

/* =========================
   🔥 REALTIME MESSAGE FINAL
========================= */

client.removeAllListeners("message");

client.on("message", (topic, message) => {

    let msg = message.toString().trim();
    let time = new Date().toLocaleTimeString();

    labels.push(time);

    /* ===== SUHU ===== */
    if (topic.includes("suhu")) {

        let val = parseFloat(msg);

        if (!isNaN(val)) {

            document.getElementById("suhu").innerHTML = val + "°C";

            suhuData.push(val);

            updateChartGlow(val);
            updateChartColor(val);
            cekSuhuAlert(val);
        }
    }

    /* ===== KELEMBABAN ===== */
    if (topic.includes("kelembaban")) {

        let val = parseFloat(msg);

        if (!isNaN(val)) {

            document.getElementById("hum").innerHTML = val + "%";

            humData.push(val);
        }
    }

    /* ===== CAHAYA / LDR ===== */
    if (topic.includes("ldr")) {

        let val = parseFloat(msg);

        if (!isNaN(val)) {

            document.getElementById("ldr").innerHTML = val;

            ldrData.push(val);

        } else {

            document.getElementById("ldr").innerHTML = "0";

            ldrData.push(0);
        }
    }

    autoScroll();

    chart.update('active');
});

</script>

</body>
</html>
