<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT Monitoring</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    color: white;
    text-align: center;
    background: url('https://images.unsplash.com/photo-1518770660439-4636190af475') no-repeat center center fixed;
    background-size: cover;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

.header {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    position: sticky;
    top: 0;
    z-index: 99;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.status {
    font-size: 14px;
    margin-bottom: 15px;
}

.online { color: #00ff9c; }
.offline { color: red; }

.sensor-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
}

.sensor {
    flex: 1;
    min-width: 180px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius: 16px;
    padding: 12px;
    transition: 0.25s;
}

.sensor:hover {
    transform: translateY(-6px) scale(1.05);
    box-shadow: 0 0 20px rgba(0,255,200,0.6);
}

.icon {
    font-size: 20px;
}

.value {
    font-size: 24px;
    font-weight: bold;
}

.card {
    position: relative;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border-radius: 18px;
    padding: 15px;
    margin: 12px 0;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow:
        inset 0 0 10px rgba(255,255,255,0.05),
        0 0 15px rgba(0,255,200,0.15),
        0 0 30px rgba(0,255,200,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

button {
    position: relative;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    overflow: hidden;
    color: white;
    transition: 0.3s;
}

.manual {
    background: linear-gradient(145deg, #ff9800, #ff6f00);
}

.auto {
    background: linear-gradient(145deg, #00e676, #00c853);
}

.reset {
    background: linear-gradient(145deg, #ff5252, #d50000);
}

.card button {
    width: 45%;
}

button:hover {
    transform: scale(1.07);
}

button::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(
        120deg,
        rgba(255,255,255,0.7),
        rgba(255,255,255,0.2),
        transparent
    );
    transform: skewX(-25deg);
}

button:hover::before {
    left: 130%;
    transition: 0.6s;
}

@keyframes rgbGlow {
    0% { box-shadow: 0 0 10px red; }
    50% { box-shadow: 0 0 20px cyan; }
    100% { box-shadow: 0 0 10px magenta; }
}

.rgb {
    animation: rgbGlow 2s linear infinite;
}

canvas {
    margin-top: 10px;
    transition: 0.3s;
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #ccc;
    padding-bottom: 20px;
}

.layout-row {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.temp-info {
    margin-top: 15px;
    margin-bottom: 15px;
}

.temp-info span {
    display: inline-block;
    margin: 5px;
    padding: 8px 14px;
    border-radius: 10px;
    font-weight: bold;
}

.hijau { background: rgba(0,255,0,0.2); color: lime; }
.kuning { background: rgba(255,255,0,0.2); color: yellow; }
.merah { background: rgba(255,0,0,0.2); color: red; }

</style>
</head>

<body>

<div class="header">🌐 IoT Monitoring System</div>

<div class="container">

<div id="status" class="status offline">● Offline</div>

<div class="sensor-row">

    <div class="sensor">
        <div class="icon">🌡</div>
        <div id="suhu" class="value">--</div>
    </div>

    <div class="sensor">
        <div class="icon">💧</div>
        <div id="hum" class="value">--</div>
    </div>

    <div class="sensor">
        <div class="icon">💡</div>
        <div id="ldr" class="value">--</div>
    </div>

</div>

<div class="temp-info">
    <span class="hijau">20° - 25° = HIJAU</span>
    <span class="kuning">26° - 30° = KUNING</span>
    <span class="merah">31°+ = MERAH</span>
</div>

<canvas id="chart"></canvas>

</div>

<script>

const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

let suhuData = [];
let labels = [];

const chart = new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Suhu',
            data: suhuData,
            borderColor: 'lime'
        }]
    }
});

client.on("connect", () => {
    document.getElementById("status").innerHTML = "● Online";
    document.getElementById("status").className = "status online";

    client.subscribe("smkn2klaten/kel-8/esp32/suhu");
});

client.on("message", (topic, message) => {

    let val = parseFloat(message.toString());

    /* 🔥 SUHU + KATEGORI */
    let statusSuhu = "";
    let warna = "white";

    if (val >= 20 && val <= 25) {
        statusSuhu = "HIJAU";
        warna = "lime";
    } 
    else if (val >= 26 && val <= 30) {
        statusSuhu = "KUNING";
        warna = "yellow";
    } 
    else if (val >= 31) {
        statusSuhu = "MERAH";
        warna = "red";
    } 
    else {
        statusSuhu = "DINGIN";
        warna = "cyan";
    }

    document.getElementById("suhu").innerHTML =
        val + "°C<br><span style='color:" + warna + "'>" + statusSuhu + "</span>";

    labels.push(new Date().toLocaleTimeString());
    suhuData.push(val);

    chart.update();
});

</script>

</body>
</html>
