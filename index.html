<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT Monitoring</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    color: white;
    text-align: center;
    background: url('https://images.unsplash.com/photo-1518770660439-4636190af475') no-repeat center center fixed;
    background-size: cover;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* 🔥 ALARM MERAH */
@keyframes alarmFlash {
    0% { background-color: rgba(255,0,0,0); }
    50% { background-color: rgba(255,0,0,0.4); }
    100% { background-color: rgba(255,0,0,0); }
}

.alarm {
    animation: alarmFlash 0.8s infinite;
}

.header {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    position: sticky;
    top: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.status { font-size: 14px; margin-bottom: 10px; }
.online { color: #00ff9c; }
.offline { color: red; }

.sensor-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
}

.sensor {
    flex: 1;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius: 16px;
    padding: 12px;
}

.value { font-size: 24px; font-weight: bold; }

.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border-radius: 18px;
    padding: 15px;
    margin: 12px 0;
}

.layout-row {
    display: flex;
    gap: 15px;
}

canvas {
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">🌐 IoT Monitoring System</div>

<div class="container">

<div id="status" class="status offline">● Offline</div>

<div class="sensor-row">
    <div class="sensor"><div>🌡</div><div id="suhu" class="value">--</div></div>
    <div class="sensor"><div>💧</div><div id="hum" class="value">--</div></div>
    <div class="sensor"><div>💡</div><div id="ldr" class="value">--</div></div>
</div>

<div class="layout-row">
<div class="card" style="flex:1;">
<h3>Grafik Sensor</h3>
<canvas id="chart"></canvas>
</div>
</div>

</div>

<script>
const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

let labels = [];
let suhuData = [];
let humData = [];
let ldrData = [];

const MAX_DATA = 20;

const ctx = document.getElementById("chart");

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [
            { label: 'Suhu', data: suhuData, borderWidth: 2 },
            { label: 'Kelembapan', data: humData, borderWidth: 2 },
            { label: 'Cahaya', data: ldrData, borderWidth: 2 }
        ]
    },
    options: {
        responsive: true,
        animation: {
            duration: 600,
            easing: 'linear'
        },
        elements: {
            line: { tension: 0.35 },
            point: { radius: 2 }
        },
        scales: {
            x: { ticks: { color: "white" } },
            y: { ticks: { color: "white" } }
        },
        plugins: {
            legend: { labels: { color: "white" } }
        }
    }
});

/* 🔥 TRAIL EFFECT */
const originalDraw = chart.draw;
chart.draw = function() {
    const ctx = this.ctx;
    ctx.save();
    ctx.shadowColor = chart.data.datasets[0].borderColor || "lime";
    ctx.shadowBlur = 15;
    originalDraw.apply(this, arguments);
    ctx.restore();
};

/* 🔔 NOTIF */
if (Notification.permission !== "granted") {
    Notification.requestPermission();
}

let lastAlert = 0;

function playSound() {
    new Audio("https://www.soundjay.com/buttons/sounds/beep-07.mp3").play();
}

/* 🔥 MAIN LOGIC */
client.on("connect", () => {
    document.getElementById("status").innerHTML = "● Online";
    document.getElementById("status").className = "status online";

    client.subscribe("smkn2klaten/kel-8/esp32/suhu");
    client.subscribe("smkn2klaten/kel-8/esp32/kelembaban");
    client.subscribe("smkn2klaten/kel-8/esp32/ldr");
});

client.on("message", (topic, message) => {
    let msg = message.toString();
    let time = new Date().toLocaleTimeString();

    labels.push(time);

    if (topic.includes("suhu")) {
        let val = parseFloat(msg);
        document.getElementById("suhu").innerHTML = val + "°C";
        suhuData.push(val);

        /* 🔥 WARNA DINAMIS */
        let color = val < 28 ? "lime" : val < 32 ? "yellow" : "red";
        chart.data.datasets[0].borderColor = color;

        /* 🔥 GLOW */
        ctx.style.boxShadow = `0 0 25px ${color}`;

        /* 🔥 ALARM */
        if (val >= 31) {
            document.body.classList.add("alarm");

            if (Date.now() - lastAlert > 10000) {
                lastAlert = Date.now();

                if (Notification.permission === "granted") {
                    new Notification("🔥 SUHU TINGGI!", {
                        body: "Suhu " + val + "°C"
                    });
                }

                playSound();
            }
        } else {
            document.body.classList.remove("alarm");
        }
    }

    if (topic.includes("kelembaban")) {
        document.getElementById("hum").innerHTML = msg + "%";
        humData.push(parseFloat(msg));
    }

    if (topic.includes("ldr")) {
        document.getElementById("ldr").innerHTML = msg;
        ldrData.push(parseFloat(msg));
    }

    /* 🔥 AUTO SCROLL */
    if (labels.length > MAX_DATA) {
        labels.shift();
        suhuData.shift();
        humData.shift();
        ldrData.shift();
    }

    chart.update();
});
</script>

</body>
</html>
