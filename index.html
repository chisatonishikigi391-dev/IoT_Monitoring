<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT Monitoring</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    color: white;
    text-align: center;
    background: url('https://images.unsplash.com/photo-1518770660439-4636190af475') no-repeat center center fixed;
    background-size: cover;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

.header {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    position: sticky;
    top: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.status { font-size: 14px; margin-bottom: 10px; }
.online { color: #00ff9c; }
.offline { color: red; }

.sensor-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
}

.sensor {
    flex: 1;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius: 16px;
    padding: 12px;
    transition: 0.25s;
}

.sensor:hover {
    transform: translateY(-6px) scale(1.05);
    box-shadow: 0 0 20px rgba(0,255,200,0.6);
}

.icon { font-size: 20px; }
.value { font-size: 24px; font-weight: bold; }

/* CARD */
.card {
    position: relative;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border-radius: 18px;
    padding: 15px;
    margin: 12px 0;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow:
        inset 0 0 10px rgba(255,255,255,0.05),
        0 0 15px rgba(0,255,200,0.15),
        0 0 30px rgba(0,255,200,0.08);
    transition: 0.3s;
}

.card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 18px;
    background: linear-gradient(120deg, rgba(255,255,255,0.15), transparent 40%);
    opacity: 0.4;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow:
        inset 0 0 12px rgba(255,255,255,0.08),
        0 0 20px rgba(0,255,200,0.4),
        0 0 40px rgba(0,255,200,0.2);
}

/* BUTTON */
button {
    position: relative;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    overflow: hidden;
}

/* 🔥 WARNA */
.manual { background: linear-gradient(145deg, #ff9800, #ff6f00); }
.auto { background: linear-gradient(145deg, #00e676, #00c853); }
.reset { background: linear-gradient(145deg, #ff5252, #d50000); }

.card button { width: 45%; }

button:hover {
    transform: scale(1.07);
}

/* 🔥 GLOSSY SHINE (INI FIX UTAMA) */
button::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(
        120deg,
        rgba(255,255,255,0.7),
        rgba(255,255,255,0.2),
        transparent
    );
    transform: skewX(-25deg);
}

button:hover::before {
    left: 130%;
    transition: 0.6s;
}

/* RIPPLE */
button::after {
    content: "";
    position: absolute;
    width: 0;
    height: 0;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
}

.manual::after { background: rgba(255,165,0,0.6); }
.auto::after { background: rgba(0,255,120,0.6); }
.reset::after { background: rgba(255,0,0,0.6); }

button:active::after {
    width: 120px;
    height: 120px;
    opacity: 1;
}

/* RGB RESET */
@keyframes rgbGlow {
    0% { box-shadow: 0 0 10px red; }
    50% { box-shadow: 0 0 20px cyan; }
    100% { box-shadow: 0 0 10px magenta; }
}

.rgb {
    animation: rgbGlow 2s linear infinite;
}

/* CHART */
canvas {
    margin-top: 10px;
    transition: 0.3s;
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #ccc;
}

.layout-row {
    display: flex;
    gap: 15px;
}

</style>
</head>

<body>

<div class="header">🌐 IoT Monitoring System</div>

<div class="container">

<div id="status" class="status offline">● Offline</div>

<div class="sensor-row">
    <div class="sensor"><div class="icon">🌡</div><div id="suhu" class="value">--</div></div>
    <div class="sensor"><div class="icon">💧</div><div id="hum" class="value">--</div></div>
    <div class="sensor"><div class="icon">💡</div><div id="ldr" class="value">--</div></div>
</div>

<div class="layout-row">

<div class="card" style="flex:1;">
<h3>Grafik Sensor</h3>
<canvas id="chart"></canvas>
</div>

<div class="card" style="flex:1;">
<h3>Manual Control</h3>

<button class="manual" onclick="sendCmd('R1:1')">R1 ON</button>
<button class="manual" onclick="sendCmd('R1:0')">R1 OFF</button><br>

<button class="manual" onclick="sendCmd('R2:1')">R2 ON</button>
<button class="manual" onclick="sendCmd('R2:0')">R2 OFF</button><br>

<button class="manual" onclick="sendCmd('R3:1')">R3 ON</button>
<button class="manual" onclick="sendCmd('R3:0')">R3 OFF</button><br>

<button class="manual" onclick="sendCmd('R4:1')">R4 ON</button>
<button class="manual" onclick="sendCmd('R4:0')">R4 OFF</button><br>

<button class="reset rgb" onclick="resetAll()">RESET</button>
</div>

</div>

<div class="card">
<h3>Mode</h3>
<button class="auto" onclick="sendCmd('MODE:SUHU')">AUTO</button>
<button class="manual" onclick="sendCmd('MODE:BUTTON')">MANUAL</button>
</div>

</div>

<div class="footer">© 2026 IoT Monitoring/LiHaDa.id</div>

<script>

const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

let labels = [];
let suhuData = [];
let humData = [];
let ldrData = [];

const ctx = document.getElementById("chart");

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [
            { label: 'Suhu', data: suhuData, borderWidth: 2 },
            { label: 'Kelembapan', data: humData, borderWidth: 2 },
            { label: 'Cahaya', data: ldrData, borderWidth: 2 }
        ]
    },
    options: {
        responsive: true,
        scales: {
            x: { ticks: { color: "white" } },
            y: { ticks: { color: "white" } }
        },
        plugins: {
            legend: { labels: { color: "white" } }
        }
    }
});

/* CHART GLOW */
function updateChartGlow(suhu) {
    if (suhu < 28) ctx.style.boxShadow = "0 0 20px lime";
    else if (suhu < 32) ctx.style.boxShadow = "0 0 25px yellow";
    else ctx.style.boxShadow = "0 0 30px red";
}

client.on("connect", () => {
    document.getElementById("status").innerHTML = "● Online";
    document.getElementById("status").className = "status online";

    client.subscribe("smkn2klaten/kel-8/esp32/suhu");
    client.subscribe("smkn2klaten/kel-8/esp32/kelembaban");
    client.subscribe("smkn2klaten/kel-8/esp32/ldr");
});

client.on("message", (topic, message) => {
    let msg = message.toString();
    let time = new Date().toLocaleTimeString();

    if (labels.length > 10) {
        labels.shift();
        suhuData.shift();
        humData.shift();
        ldrData.shift();
    }

    labels.push(time);

    if (topic.includes("suhu")) {
        let val = parseFloat(msg);
        document.getElementById("suhu").innerHTML = val + "°C";
        suhuData.push(val);
        updateChartGlow(val);
    }

    if (topic.includes("kelembaban")) {
        document.getElementById("hum").innerHTML = msg + "%";
        humData.push(parseFloat(msg));
    }

    if (topic.includes("ldr")) {
        document.getElementById("ldr").innerHTML = msg;
        ldrData.push(parseFloat(msg));
    }

    chart.update();
});

function sendCmd(cmd) {
    client.publish("smkn2klaten/kel-8/esp32/control", cmd);
}

function resetAll() {
    client.publish("smkn2klaten/kel-8/esp32/control","R1:0#R2:0#R3:0#R4:0");
}

</script>

        color = "red";

    <script>

/* 🔔 MINTA IZIN NOTIFIKASI */
if (Notification.permission !== "granted") {
    Notification.requestPermission();
}

/* 🔊 SOUND ALERT */
function playAlertSound() {
    const audio = new Audio("https://www.soundjay.com/buttons/sounds/beep-07.mp3");
    audio.play();
}

/* 🔥 NOTIFIKASI SUHU */
let lastAlert = 0;

function cekSuhuAlert(suhu) {
    let now = Date.now();

    if (suhu >= 31 && now - lastAlert > 10000) { // delay 10 detik biar gak spam
        lastAlert = now;

        // popup notif
        if (Notification.permission === "granted") {
            new Notification("🔥 SUHU TINGGI!", {
                body: "Suhu mencapai " + suhu + "°C",
                icon: "https://cdn-icons-png.flaticon.com/512/1684/1684375.png"
            });
        }

        // bunyi
        playAlertSound();
    }
}

    <script>

/* =========================
   🔥 1. REALTIME SMOOTH UPDATE
========================= */
let smoothTimer = null;

function smoothUpdateChart() {
    if (smoothTimer) cancelAnimationFrame(smoothTimer);

    function animate() {
        chart.update('none'); // update tanpa flicker
        smoothTimer = requestAnimationFrame(animate);
    }

    animate();

    // stop setelah 500ms biar hemat
    setTimeout(() => {
        cancelAnimationFrame(smoothTimer);
    }, 500);
}


/* =========================
   🔥 2. TRAIL EFFECT (JEJAK GARIS)
========================= */
const originalDraw = chart.draw;

chart.draw = function() {
    const ctx = this.ctx;

    ctx.save();
    ctx.shadowColor = chart.data.datasets[0].borderColor || "lime";
    ctx.shadowBlur = 15;   // kekuatan glow
    ctx.lineWidth = 2;

    originalDraw.apply(this, arguments);

    ctx.restore();
};


/* =========================
   🔥 SUNTIK TANPA UBAH KODE AWAL
========================= */
const oldHandler = client.listeners("message")[0];
client.removeAllListeners("message");

});

</script>
